version: 1
project:
  name: ciwi

pipelines:
  - id: build
    trigger: manual
    vcs_source:
      repo: https://github.com/izzyreal/ciwi.git
    versioning:
      file: VERSION
      tag_prefix: v
    jobs:
      - id: unit-tests
        runs_on:
          executor: script
          shell: posix
        go_cache: {}
        requires:
          tools:
            git: "*"
            go: ">=1.24"
        timeout_seconds: 600
        steps:
          - name: Run Go Unit
            test:
              name: go-unit
              command: mkdir -p dist && go test -json -coverprofile=dist/go-unit.cover ./... > dist/go-unit.json
              format: go-test-json
              report: dist/go-unit.json
              coverage_format: go-coverprofile
              coverage_report: dist/go-unit.cover
      - id: build-cross-platform
        needs:
          - unit-tests
        runs_on:
          executor: script
          shell: posix
        go_cache: {}
        requires:
          tools:
            git: "*"
            go: ">=1.24"
        timeout_seconds: 600
        artifacts:
          - dist/**
        matrix:
          include:
            - name: linux-amd64
              goos: linux
              goarch: amd64
              ext: ""
            - name: windows-amd64
              goos: windows
              goarch: amd64
              ext: ".exe"
            - name: windows-arm64
              goos: windows
              goarch: arm64
              ext: ".exe"
            - name: darwin-amd64
              goos: darwin
              goarch: amd64
              ext: ""
            - name: darwin-arm64
              goos: darwin
              goarch: arm64
              ext: ""
        steps:
          - name: Prepare dist
            run: mkdir -p dist
          - name: Build ciwi binary
            run: GOOS={{goos}} GOARCH={{goarch}} CGO_ENABLED=0 go build -v -trimpath -ldflags="-s -w -X github.com/izzyreal/ciwi/internal/version.Version=${CIWI_PIPELINE_VERSION}" -o dist/ciwi-{{name}}{{ext}} ./cmd/ciwi
  - id: release
    trigger: manual
    depends_on:
      - build
      - codesign-macos
    vcs_source:
      repo: https://github.com/izzyreal/ciwi.git
    versioning:
      file: VERSION
      tag_prefix: v
      auto_bump: patch
      auto_bump_vcs_token: "{{ secret.github-secret }}"
      auto_bump_vault:
        connection: home-vault
        secrets:
          - name: github-secret
            mount: kv
            path: gh
            key: token
            kv_version: 2
    jobs:
      - id: github-release
        runs_on:
          executor: script
          shell: posix
        requires:
          tools:
            git: "*"
            gh: "*"
        timeout_seconds: 1200
        steps:
          - name: Check credentials
            run: test -n "$GITHUB_TOKEN"
            skip_dry_run: true
            vault:
              connection: home-vault
              secrets:
                - name: github-secret
                  mount: kv
                  path: gh
                  key: token
                  kv_version: 2
            env:
              GITHUB_TOKEN: "{{ secret.github-secret }}"
          - name: Configure release remote
            run: git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/izzyreal/ciwi.git"
            skip_dry_run: true
            vault:
              connection: home-vault
              secrets:
                - name: github-secret
                  mount: kv
                  path: gh
                  key: token
                  kv_version: 2
            env:
              GITHUB_TOKEN: "{{ secret.github-secret }}"
          - name: Check release version
            run: test -f VERSION
          - name: Check working tree
            run: |
              DIRTY="$(git status --porcelain | grep -vE '^\?\? dist/' || true)"
              if [ -n "$DIRTY" ]; then
                echo "working tree is not clean"
                exit 1
              fi
          - name: Check release tag
            run: |
              TAG="${CIWI_PIPELINE_TAG}"
              if git rev-parse "$TAG" >/dev/null 2>&1; then
                echo "tag exists: $TAG"
                exit 1
              fi
              if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
                echo "remote tag exists: $TAG"
                exit 1
              fi
          - name: Create checksums
            run: |
              test -f dist/ciwi-linux-amd64
              test -f dist/ciwi-darwin-amd64
              test -f dist/ciwi-darwin-arm64
              test -f dist/codesigned-macos/ciwi-darwin-amd64.zip
              test -f dist/codesigned-macos/ciwi-darwin-arm64.zip
              test -f dist/ciwi-windows-amd64.exe
              test -f dist/ciwi-windows-arm64.exe
              for f in \
                dist/ciwi-linux-amd64 \
                dist/ciwi-darwin-amd64 \
                dist/ciwi-darwin-arm64 \
                dist/codesigned-macos/ciwi-darwin-amd64.zip \
                dist/codesigned-macos/ciwi-darwin-arm64.zip \
                dist/ciwi-windows-amd64.exe \
                dist/ciwi-windows-arm64.exe; do
                shasum -a 256 "$f" | awk '{ sub(/^.*\//, "", $2); print $1 "  " $2 }'
              done > dist/ciwi-checksums.txt
              test -f dist/ciwi-checksums.txt
            skip_dry_run: true
          - name: Create release tag
            run: |
              TAG="${CIWI_PIPELINE_TAG}"
              git tag -a "$TAG" -m "ciwi $TAG"
              git push origin "$TAG"
            skip_dry_run: true
          - name: Upload release assets
            run: |
              TAG="${CIWI_PIPELINE_TAG}"
              gh release create "$TAG" \
                --repo izzyreal/ciwi \
                --title "ciwi $TAG" \
                --notes "Release $TAG"

              set -- \
                dist/ciwi-linux-amd64 \
                dist/ciwi-darwin-amd64 \
                dist/ciwi-darwin-arm64 \
                dist/codesigned-macos/ciwi-darwin-amd64.zip \
                dist/codesigned-macos/ciwi-darwin-arm64.zip \
                dist/ciwi-windows-amd64.exe \
                dist/ciwi-windows-arm64.exe \
                dist/ciwi-checksums.txt
              TOTAL="$#"
              IDX=0
              for FILE in "$@"; do
                IDX=$((IDX + 1))
                SIZE="$(wc -c < "$FILE" | tr -d ' ')"
                START="$(date +%s)"
                echo "[release] Uploading ${IDX}/${TOTAL}: ${FILE} (${SIZE} bytes)"
                gh release upload "$TAG" "$FILE" --repo izzyreal/ciwi --clobber
                END="$(date +%s)"
                echo "[release] Uploaded ${IDX}/${TOTAL}: ${FILE} in $((END-START))s"
              done
            skip_dry_run: true
            vault:
              connection: home-vault
              secrets:
                - name: github-secret
                  mount: kv
                  path: gh
                  key: token
                  kv_version: 2
            env:
              GITHUB_TOKEN: "{{ secret.github-secret }}"

  - id: codesign-macos
    trigger: manual
    depends_on:
      - build
    vcs_source:
      repo: https://github.com/izzyreal/ciwi.git
    jobs:
      - id: macos-codesign
        runs_on:
          executor: script
          shell: posix
          os: darwin
          arch: arm64
        requires:
          tools:
            codesign: "*"
        timeout_seconds: 1200
        artifacts:
          - dist/codesigned-macos/*.zip
        steps:
          - name: Check credentials
            run: test -n "$DEV_IDENTITY_APP" && test -n "$NOTARYTOOL_PASSWORD" && test -n "$APPLE_TEAM_ID" && test -n "$APPLE_ID"
            skip_dry_run: true
            vault:
              connection: home-vault
              secrets:
                - name: dev-identity-app
                  mount: kv
                  path: apple-id
                  key: dev-identity-app
                - name: notarytool-password
                  mount: kv
                  path: notarytool
                  key: password
                - name: apple-team-id
                  mount: kv
                  path: apple-id
                  key: team-id
                - name: apple-id
                  mount: kv
                  path: apple-id
                  key: email
            env:
              DEV_IDENTITY_APP: "{{ secret.dev-identity-app }}"
              NOTARYTOOL_PASSWORD: "{{ secret.notarytool-password }}"
              APPLE_TEAM_ID: "{{ secret.apple-team-id }}"
              APPLE_ID: "{{ secret.apple-id }}"
          - name: Check artifact
            run: test -f dist/ciwi-darwin-amd64 && test -f dist/ciwi-darwin-arm64
          - name: Prepare codesign output
            run: rm -rf dist/codesigned-macos && mkdir -p dist/codesigned-macos/bundles
            skip_dry_run: true
          - name: Copy app bundle amd64
            run: sh scripts/build_macos_agent_bundle.sh dist/ciwi-darwin-amd64 "${CIWI_PIPELINE_VERSION}" dist/codesigned-macos/bundles/CiwiAgent-amd64.app dist/codesigned-macos/ciwi-darwin-amd64.zip
            skip_dry_run: true
            vault:
              connection: home-vault
              secrets:
                - name: dev-identity-app
                  mount: kv
                  path: apple-id
                  key: dev-identity-app
                - name: notarytool-password
                  mount: kv
                  path: notarytool
                  key: password
                - name: apple-team-id
                  mount: kv
                  path: apple-id
                  key: team-id
                - name: apple-id
                  mount: kv
                  path: apple-id
                  key: email
            env:
              DEV_IDENTITY_APP: "{{ secret.dev-identity-app }}"
              NOTARYTOOL_PASSWORD: "{{ secret.notarytool-password }}"
              APPLE_TEAM_ID: "{{ secret.apple-team-id }}"
              APPLE_ID: "{{ secret.apple-id }}"
          - name: Copy app bundle arm64
            run: sh scripts/build_macos_agent_bundle.sh dist/ciwi-darwin-arm64 "${CIWI_PIPELINE_VERSION}" dist/codesigned-macos/bundles/CiwiAgent-arm64.app dist/codesigned-macos/ciwi-darwin-arm64.zip
            skip_dry_run: true
            vault:
              connection: home-vault
              secrets:
                - name: dev-identity-app
                  mount: kv
                  path: apple-id
                  key: dev-identity-app
                - name: notarytool-password
                  mount: kv
                  path: notarytool
                  key: password
                - name: apple-team-id
                  mount: kv
                  path: apple-id
                  key: team-id
                - name: apple-id
                  mount: kv
                  path: apple-id
                  key: email
            env:
              DEV_IDENTITY_APP: "{{ secret.dev-identity-app }}"
              NOTARYTOOL_PASSWORD: "{{ secret.notarytool-password }}"
              APPLE_TEAM_ID: "{{ secret.apple-team-id }}"
              APPLE_ID: "{{ secret.apple-id }}"

pipeline_chains:
  - id: build-release
    pipelines:
      - build
      - codesign-macos
      - release
